# Test public keys (.pub) and metadata (.meta.json) are intentional fixtures
# for cross-language verification. PEM private keys (.key) are NEVER
# committed; the .pre-commit-config.yaml detect-private-key hook + CI
# enforce this. See SECURITY.md "Test Key Rotation (SAN-404)" for the
# rotation history.
paths-ignore:
  - "fixtures/keypairs/*.pub"
  - "fixtures/keypairs/*.meta.json"
