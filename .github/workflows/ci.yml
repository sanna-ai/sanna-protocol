name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-schemas:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.12'

      - name: Validate JSON schemas parse cleanly
        run: |
          python3 -c "
          import json, glob, sys
          files = sorted(glob.glob('schemas/**/*.json', recursive=True))
          print(f'Parsing {len(files)} schema files:')
          for f in files:
              try:
                  json.load(open(f))
                  print(f'  OK  {f}')
              except Exception as e:
                  print(f'  FAIL {f}: {e}')
                  sys.exit(1)
          print('All schemas parsed OK')
          "
